version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin AKIA5D5SEZMSLAJWE5PR.dkr.ecr.eu-central-1.amazonaws.com
  build:
    commands:
      - echo Building Docker image...
      - docker build -t ml-api .
      - docker tag ml-api:latest AKIA5D5SEZMSLAJWE5PR.dkr.ecr.eu-central-1.amazonaws.com/ml-api:latest
  post_build:
    commands:
      - echo Pushing Docker image to ECR...
      - docker push AKIA5D5SEZMSLAJWE5PR.dkr.ecr.eu-central-1.amazonaws.com/ml-api:latest